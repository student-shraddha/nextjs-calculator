name: Simple EC2 Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: 3.96.190.246
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/ubuntu/nextjs-calculator"

      - name: Restart app
        uses: appleboy/ssh-action@master
        with:
          host: 3.96.190.246
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/nextjs-calculator
            npm install
            npm run build
            pm2 delete new || true
            pm2 start npm --name "new" -- start
            pm2 save
